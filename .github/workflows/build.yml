name: build-changelog
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python kamsoft_zmiany.py --od-roku 2019 --out index.html
      - name: commit & push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "auto: aktualizacja changelogow $(date -u +%F)" || echo "brak zmian"
          git push
